# Merge blocking: enable branch protection on the default branch and require
# this workflow’s checks (e.g. "Lint / Lint and Check Format", "Lint / Unit tests and coverage")
# under Settings → Branches → Branch protection rule → "Require status checks to pass".
name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint and Check Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:github

      - name: Format check
        run: pnpm run format:check

  test:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage thresholds
        run: pnpm run test:coverage

      - name: Upload coverage HTML
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage
